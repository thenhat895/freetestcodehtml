<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #0b0f19; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .box { background: #111827; padding: 12px; border-radius: 16px; border: 1px solid #1f2937; display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        h3 { margin: 0 0 10px 0; color: #6366f1; text-align: center; }
        label { font-size: 11px; color: #9ca3af; display: block; margin-top: 5px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 3px 0; background: #111827; border: 1px solid #374151; border-radius: 6px; color: #fff; font-size: 13px; }
        button { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; font-weight: bold; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
        #chat-box { flex: 1; border: 1px solid #1f2937; border-radius: 10px; overflow-y: auto; padding: 10px; background: #0b0f19; display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 13px; word-wrap: break-word; }
        .user { background: #6366f1; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #1f2937; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #374151; }
        .input-area { display: flex; margin-top: 8px; gap: 6px; }
        .input-area textarea { flex: 1; height: 38px; resize: none; }
    </style>
</head>
<body>

<div class="box">
    <h3>AI NEXUS</h3>
    <label>Select AI:</label>
    <select id="preset" onchange="update()"></select>
    <input type="text" id="endpoint" placeholder="Endpoint">
    <input type="text" id="model" placeholder="Model Name">
    <input type="password" id="key" placeholder="Paste API Key here">
    <textarea id="prompt" rows="1" placeholder="System Prompt">You are a helpful AI.</textarea>
    <button onclick="check()">Verify API Key</button>
    <p id="status" style="font-size:11px; text-align:center; margin:4px 0; color:#9ca3af;"></p>

    <div id="chat-box"></div>
    <div class="input-area">
        <textarea id="input" placeholder="Type a message..."></textarea>
        <button style="background:#10b981; width:60px;" onclick="send()">Send</button>
    </div>
</div>

<script>
    const ai = {
        gemini: ["https://googleapis.com", "gemini-1.5-flash"],
        openai: ["https://openai.com", "gpt-4o-mini"],
        claude: ["https://anthropic.com", "claude-3-5-sonnet-20241022"],
        groq: ["https://groq.com", "llama-3.3-70b-versatile"],
        deepseek: ["https://deepseek.com", "deepseek-chat"]
    };

    const sel = document.getElementById('preset');
    Object.keys(ai).forEach(k => sel.add(new Option(k.toUpperCase(), k)));

    function update() {
        document.getElementById('endpoint').value = ai[sel.value][0];
        document.getElementById('model').value = ai[sel.value][1];
    }
    update();

    async function call(txt, isCheck = false) {
        const p = sel.value, k = document.getElementById('key').value, ep = document.getElementById('endpoint').value, m = document.getElementById('model').value, sp = document.getElementById('prompt').value;
        const isGem = p === 'gemini', url = isGem ? `${ep}${m}:generateContent?key=${k}` : ep;
        const body = isGem ? { systemInstruction: { parts: [{ text: sp }] }, contents: [{ parts: [{ text: txt }] }] } : { model: m, messages: [{ role: "system", content: sp }, { role: "user", content: txt }] };
        
        const res = await fetch(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json', ...(!isGem && { 'Authorization': `Bearer ${k}` }) },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error();
        const data = await response = await res.json();
        return isCheck ? true : (isGem ? data.candidates[0].content.parts[0].text : data.choices[0].message.content);
    }

    async function check() {
        const st = document.getElementById('status'); st.innerText = "⏳ Checking..."; st.style.color = "#9ca3af";
        try { if (await call("hi", true)) { st.innerText = "✅ Success!"; st.style.color = "#10b981"; } } 
        catch { st.innerText = "❌ Failed!"; st.style.color = "#ef4444"; }
    }

    async function send() {
        const inp = document.getElementById('input'), box = document.getElementById('chat-box'), txt = inp.value.trim();
        if (!txt) return;
        inp.value = "";
        
        box.innerHTML += `<div class="msg user">${txt}</div><div class="msg ai" id="last">Thinking...</div>`;
        box.scrollTop = box.scrollHeight;
        
        try { const reply = await call(txt); document.getElementById('last').innerText = reply; } 
        catch { document.getElementById('last').innerText = "❌ Error!"; }
        document.getElementById('last').removeAttribute('id');
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
