<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure AI Nexus</title>
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #0b0f19; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .box { background: #111827; padding: 12px; border-radius: 16px; border: 1px solid #1f2937; display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        h3 { margin: 0 0 10px 0; color: #6366f1; text-align: center; font-size: 18px; }
        label { font-size: 11px; color: #9ca3af; display: block; margin-top: 4px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px 10px; margin: 2px 0 6px 0; background: #111827; border: 1px solid #374151; border-radius: 8px; color: #fff; font-size: 13px; }
        button { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; font-weight: bold; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        #chat-box { flex: 1; border: 1px solid #1f2937; border-radius: 12px; overflow-y: auto; padding: 10px; background: #0b0f19; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 13px; word-wrap: break-word; }
        .user { background: #6366f1; align-self: flex-end; }
        .ai { background: #1f2937; align-self: flex-start; border: 1px solid #374151; }
        .input-area { display: flex; gap: 6px; margin-top: 8px; }
        .input-area textarea { flex: 1; height: 40px; resize: none; margin: 0; }
        #share-url { background: #1f2937; padding: 8px; border-radius: 6px; font-size: 11px; color: #34d399; word-break: break-all; margin-bottom: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>SECURE AI NEXUS</h3>
    <div id="share-url" onclick="navigator.clipboard.writeText(this.innerText);alert('Copied link!')"></div>

    <select id="preset" onchange="update()"></select>
    <input type="text" id="endpoint" placeholder="Endpoint">
    <input type="text" id="model" placeholder="Model Name">
    <input type="password" id="key" placeholder="Enter API Key">
    <input type="password" id="pass" placeholder="Enter Password to Protect Key">
    <textarea id="prompt" rows="1">You are a helpful AI assistant.</textarea>
    
    <div style="display: flex; gap: 6px; margin-bottom: 6px;">
        <button style="flex:1" onclick="check()">Verify Key</button>
        <button style="flex:1; background:#10b981;" id="s-btn" onclick="share()">Get Secure Link</button>
    </div>
    <p id="status" style="font-size:11px; text-align:center; margin:2px 0; font-weight:bold;"></p>

    <div id="chat-box"></div>
    <div class="input-area">
        <textarea id="input" placeholder="Type a message..."></textarea>
        <button style="background:#10b981; width:65px;" onclick="send()">Send</button>
    </div>
</div>

<script>
    const ai = {
        gemini: ["https://googleapis.com", "gemini-1.5-flash"],
        openai: ["https://openai.com", "gpt-4o-mini"],
        groq: ["https://groq.com", "llama-3.3-70b-versatile"],
        deepseek: ["https://deepseek.com", "deepseek-chat"]
    };
    const proxy = "https://corsproxy.io?", sel = document.getElementById('preset');
    let decKey = "";

    Object.keys(ai).forEach(k => sel.add(new Option(k.toUpperCase(), k)));
    function update() {
        document.getElementById('endpoint').value = ai[sel.value][0];
        document.getElementById('model').value = ai[sel.value][1];
    }
    update();

    async function load() {
        const id = new URLSearchParams(window.location.search).get('p');
        if (!id) return;
        document.getElementById('status').innerText = "⏳ Loading configuration...";
        const res = await fetch(`https://kvbin.com{id}`);
        if (res.ok) {
            const data = await res.json();
            sel.value = data.p; update();
            document.getElementById('endpoint').value = data.ep;
            document.getElementById('model').value = data.m;
            document.getElementById('prompt').value = data.pr;
            const p = prompt("Enter secret password to unlock AI Chat:");
            if (p) {
                try {
                    decKey = CryptoJS.AES.decrypt(data.ek, p).toString(CryptoJS.enc.Utf8);
                    if (decKey) {
                        document.getElementById('status').innerText = "✅ Unlocked!";
                        document.getElementById('key').value = "PROTECTED";
                        document.getElementById('pass').value = p;
                    } else { document.getElementById('status').innerText = "❌ Wrong Password!"; }
                } catch(e) { document.getElementById('status').innerText = "❌ Error!"; }
            }
        }
    }
    load();

    async function call(txt, isChk = false) {
        const p = sel.value, ep = document.getElementById('endpoint').value, m = document.getElementById('model').value, pr = document.getElementById('prompt').value;
        const k = decKey || document.getElementById('key').value;
        const isGem = p === 'gemini', url = isGem ? `${ep}${m}:generateContent?key=${k}` : ep;
        const body = isGem ? { systemInstruction: { parts: [{ text: pr }] }, contents: [{ parts: [{ text: txt }] }] } : { model: m, messages: [{ role: "system", content: pr }, { role: "user", content: txt }] };
        const headers = { "Content-Type": "application/json", ...(!isGem && { "Authorization": `Bearer ${k}` }) };
        
        const res = await fetch(proxy + encodeURIComponent(url), { method: 'POST', headers: headers, body: JSON.stringify(body) });
        if (!res.ok) throw new Error();
        const resData = await res.json();
        return isChk ? true : (isGem ? resData.candidates[0].content.parts[0].text : resData.choices[0].message.content);
    }

    async function check() {
        const st = document.getElementById('status'); st.innerText = "⏳ Verifying...";
        try { if (await call("hi", true)) st.innerText = "✅ Key is valid!"; } 
        catch { st.innerText = "❌ Verification Failed!"; }
    }

    async function share() {
        const k = decKey || document.getElementById('key').value, p = document.getElementById('pass').value;
        if (!k || !p) return alert("Enter Key and Password first!");
        const sBtn = document.getElementById('s-btn'); sBtn.innerText = "⏳ Saving...";
        
        const config = { p: sel.value, ep: document.getElementById('endpoint').value, m: document.getElementById('model').value, pr: document.getElementById('prompt').value, ek: CryptoJS.AES.encrypt(k, p).toString() };
        const id = new URLSearchParams(window.location.search).get('p');
        const res = await fetch(id ? `https://kvbin.com{id}` : "https://kvbin.com", { method: id ? "PUT" : "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(config) });
        
        if (res.ok) {
            const finalId = id || (await res.json()).id;
            const lnk = `${window.location.origin}${window.location.pathname}?p=${finalId}`;
            window.history.pushState({}, '', lnk);
            const box = document.getElementById('share-url'); box.innerText = lnk; box.style.display = "block";
        } else { alert("Save failed!"); }
        sBtn.innerText = "Get Secure Link";
    }

    async function send() {
        const inp = document.getElementById('input'), box = document.getElementById('chat-box'), txt = inp.value.trim();
        if (!txt) return; inp.value = "";
        box.innerHTML += `<div class="msg user">${txt}</div><div class="msg ai" id="last">⚡ Thinking...</div>`;
        box.scrollTop = box.scrollHeight;
        try { const reply = await call(txt); document.getElementById('last').innerText = reply; } 
        catch { document.getElementById('last').innerText = "❌ Chat Error!"; }
        document.getElementById('last').removeAttribute('id');
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
