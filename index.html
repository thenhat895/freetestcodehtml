<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>JuniorAI Tester Pro V4</title>
    <style>
        body { background: #090d16; color: #f1f5f9; font-family: system-ui; display: flex; justify-content: center; padding: 20px; }
        .main { background: #131c2e; padding: 25px; border-radius: 16px; width: 100%; max-width: 550px; border: 1px solid #1e293b; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: #090d16; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #38bdf8; color: #090d16; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        #log { margin-top: 15px; padding: 12px; border-left: 4px solid #334155; background: #090d16; display: none; font-size: 13px; }
        .chat-box-real { margin-top: 20px; display: none; border-top: 1px solid #334155; padding-top: 15px; }
        .view { height: 180px; background: #090d16; border-radius: 8px; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-size: 13px; }
        .m-u { background: #1e293b; padding: 6px 10px; border-radius: 6px; width: fit-content; margin-left: auto; margin-bottom: 8px; text-align: right; max-width: 80%; }
        .m-a { background: rgba(56,189,248,0.1); color: #38bdf8; padding: 6px 10px; border-radius: 6px; width: fit-content; margin-bottom: 8px; max-width: 80%; }
    </style>
</head>
<body>
    <div class="main">
        <h2 style="color:#38bdf8; text-align:center; margin:0 0 5px 0;">⚡ JuniorAI Tester - V4</h2>
        <p style="text-align:center; color:#64748b; font-size:12px; margin:0 0 20px 0;">Hệ thống Kết Nối AI Thật Qua Vercel Server</p>
        
        <select id="sel"><option value="https://openai.com">OpenAI ChatGPT API</option></select>
        <input type="password" id="pass" placeholder="Nhập API Key thật vào đây">
        <button class="btn" onclick="verify()">🔍 Kích Hoạt Hệ Thống Thật</button>
        
        <div id="log"></div>

        <div class="chat-box-real" id="boxReal">
            <div class="view" id="v"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="t" placeholder="Hỏi AI thật câu gì đó đi..." style="margin:0;">
                <button class="btn" style="width:80px; padding:0;" onclick="ask()">Gửi</button>
            </div>
        </div>
    </div>
    <script>
        let history = [];
        async function verify() {
            const key = document.getElementById('pass').value;
            const log = document.getElementById('log');
            if(!key) return alert('Vui lòng điền Key!');
            log.style.display = 'block'; log.innerText = '⏳ Đang truyền dữ liệu qua Backend Vercel...';
            try {
                const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiUrl: document.getElementById('sel').value, apiKey: key, testMode: true }) });
                if(res.ok) { log.innerHTML = '<b style="color:#4ade80">✅ THÀNH CÔNG!</b> Khung chat thật đã mở.'; document.getElementById('boxReal').style.display='block'; document.getElementById('v').innerHTML='<div class="m-a">🤖 AI Thật: Chào bạn! Mình đã kết nối thành công. Bạn muốn hỏi gì?</div>'; history=[]; }
                else { log.innerHTML = '<b style="color:#f87171">❌ THẤT BẠI!</b> Key sai hoặc hết tiền rồi.'; }
            } catch(e) { log.innerHTML = '<b style="color:#f87171">💥 LỖI:</b> Hãy chắc chắn bạn đã tạo file api/chat.js trên Vercel.'; }
        }
        async function ask() {
            const inp = document.getElementById('t'); const v = document.getElementById('v'); const txt = inp.value.trim(); if(!txt) return;
            v.innerHTML += `<div class="m-u">${txt}</div>`; history.push({role:"user", content:txt}); inp.value = ''; v.scrollTop = v.scrollHeight;
            const lid = "l-" + Date.now(); v.innerHTML += `<div class="m-a" id="${lid}">🤖 AI đang nghĩ...</div>`;
            try {
                const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiUrl: document.getElementById('sel').value, apiKey: document.getElementById('pass').value, messages: history, testMode: false }) });
                const d = await res.json(); document.getElementById(lid).remove();
                if(res.ok) { const reply = d.choices[0].message.content; v.innerHTML += `<div class="m-a">🤖 ${reply}</div>`; history.push({role:"assistant", content:reply}); }
                else { v.innerHTML += `<div style="color:#f87171;margin-bottom:8px;">❌ Lỗi: ${d.error?.message || 'Không lấy được phản hồi'}</div>`; }
            } catch(e) { document.getElementById(lid).remove(); v.innerHTML += `<div style="color:#f87171;margin-bottom:8px;">💥 Mất mạng rồi!</div>`; }
            v.scrollTop = v.scrollHeight;
        }
    </script>
</body>
</html>
