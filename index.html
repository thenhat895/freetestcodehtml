    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Canvas HTML OS Platform</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #1e1e24; color: #fff; font-family: sans-serif; }
        .sidebar { width: 320px; background: #111; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        input, textarea { width: 100%; padding: 6px; background: #2d2d38; border: 1px solid #444; color: #fff; border-radius: 4px; }
        textarea { height: 100px; font-family: monospace; }
        button { width: 100%; padding: 8px; background: #00adb5; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #00f5ff; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .workspace { flex: 1; display: flex; position: relative; background: #141419; }
        canvas { flex: 1; background: #222; cursor: crosshair; border-right: 1px solid #444; }
        iframe { flex: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>🔑 HỆ THỐNG APP</h3>
        <label>IP Máy: <input type="text" id="ip" value="192.168.1.1" readonly></label>
        <label>Secret Key: <input type="text" id="key" placeholder="Nhập key bảo mật"></label>
        <button onclick="createApp()">🚀 Tạo App Mới</button>
        <button onclick="updateApp()" style="background:#393e46">🔄 Cập Nhật App</button>
        <p id="share" style="color:#00adb5; font-size:12px; word-break:break-all;"></p>

        <h3>🎨 CANVAS & CODE HTML</h3>
        <label>Màu vẽ: <input type="color" id="color" value="#00adb5"></label>
        <textarea id="code" oninput="render()"><!-- Code mẫu gọi OS -->
<div style="padding:20px; text-align:center;">
  <h2>My Mini App</h2>
  <button onclick="window.parent.postMessage('OS_HELLO', '*')" style="padding:10px; background:#00adb5; color:#fff; border:none; border-radius:4px;">Gọi Lệnh OS</button>
</div></textarea>

        <h3>📦 KVBIN STORAGE</h3>
        <input type="text" id="kv-k" placeholder="Key">
        <input type="text" id="kv-v" placeholder="Value">
        <button onclick="alert('Đã lưu dữ liệu vào KVBin tạm thời!')" style="background:#393e46">Lưu KV</button>
    </div>

    <div class="main">
        <div style="padding: 10px; background: #1a1a24;">Trạng thái: <span id="status" style="color:red">Chưa tạo</span></div>
        <div class="workspace">
            <canvas id="canvas"></canvas>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, db = {}, currentId = null;

        // Cấu hình kích thước Canvas tự động
        function initCanvas() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        window.onresize = initCanvas; setTimeout(initCanvas, 100);

        // Logic vẽ tự do trên Canvas
        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if (!drawing) return;
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = document.getElementById('color').value;
            const r = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
        };

        // Render HTML tự động vào Iframe
        function render() {
            const blob = new Blob([document.getElementById('code').value], { type: 'text/html' });
            document.getElementById('preview').src = URL.createObjectURL(blob);
        }
        render();

        // Giả lập OS nhận tín hiệu từ App con gửi ra ngoài
        window.onmessage = (e) => { if(e.data === 'OS_HELLO') alert('🖥️ OS Core thông báo: Nhận tín hiệu từ App thành công!'); };

        // Xử lý logic Tạo & Cập nhật kiểm tra IP + Secret Key
        function createApp() {
            const key = document.getElementById('key').value;
            if(!key) return alert("Vui lòng điền Secret Key trước!");
            currentId = 'id_' + Math.random().toString(36).substr(2, 5);
            db[currentId] = { html: document.getElementById('code').value, ip: '192.168.1.1', key: key };
            document.getElementById('status').innerText = "Đã hoạt động"; document.getElementById('status').style.color = "#00adb5";
            document.getElementById('share').innerText = "🔗 Link Share ID: https://os-bin.dev" + currentId;
        }

        function updateApp() {
            if(!currentId) return alert("Chưa có app nào được tạo!");
            const key = document.getElementById('key').value;
            if(db[currentId].key === key && db[currentId].ip === '192.168.1.1') {
                db[currentId].html = document.getElementById('code').value;
                alert("🔄 Cập nhật app thành công!");
            } else {
                alert("❌ Sai Secret Key hoặc IP chỉnh sửa không hợp lệ!");
            }
        }
    </script>
</body>
</html>
